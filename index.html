<!DOCTYPE html>
<html lang="uk">
<head>
   <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">  <!-- або default / black -->
<title>Кам'янське Небо - Мапа</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json"> 

    <style>
        /* Мінімальний фікс, щоб мапа не була порожньою */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; }
        #map { height: 100vh; width: 100vw; }
    </style>
</head>
<body>


<div id="map"></div>

<div class="watermark-overlay"></div>

<div id="stats-badge" class="stats-badge">Всього: 0 цілей</div>

<div class="custom-copyright">
  <span class="ua-flag">🇺🇦</span>
  <a href="https://leafletjs.com" target="_blank">Leaflet</a>
  <span class="separator">|</span>
 <span class="copy-text">©&nbsp;</span>
  <a href="https://www.google.com/maps" target="_blank">Google Maps</a>
</div>

<div class="controls pc-only">
    <div class="title">Цілі</div>
    <div class="buttons-grid">
        <button class="tool-btn" data-tool="shahed">🚀 Ракета</button>
        <button class="tool-btn" data-tool="raketa">🛸 БпЛА</button>
        <button class="tool-btn" data-tool="rozvid">🕵️‍♂️ Розвідник</button>
    </div>
    
    <div id="course-panel" style="display: none;">
        <hr>
        <div class="angle-label">Курс: <span id="angle-val">0</span>°</div>
        <input type="range" id="heading-slider" min="0" max="360" value="0">
        
       <div class="dist-label" style="margin-top: 10px;">Дальність: <span id="dist-val">1</span> км</div>
<input type="range" id="dist-slider" min="0" max="150" value="1" step="1" style="width: 100%;">
        
        <div class="lock-wrapper">
            <input type="checkbox" id="lock-angle"> <span>Закріпити курс</span>
        </div>
        <button class="delete-btn" onclick="deleteSelected()">Видалити</button>
    </div>
    <hr>
    <button class="clear-all" onclick="clearAll()">Очистити все</button>
</div>

<div class="mobile-controls mobile-only">
   <div id="course-panel-mob" class="mob-course-popup">
        <div style="display: flex; flex-direction: column; flex: 1; gap: 10px;">
            
            <div style="display: flex; align-items: center; gap: 10px;">
                <span style="min-width: 60px; font-size: 13px; white-space: nowrap;">🧭 <span id="angle-val-mob">0</span>°</span>
                <input type="range" id="heading-slider-mob" min="0" max="360" value="0" style="flex: 1;">
            </div>
            
            <div style="display: flex; align-items: center; gap: 10px;">
                <span style="min-width: 60px; font-size: 13px; white-space: nowrap;">📏 <span id="dist-val-mob">1</span> км</span>
                <input type="range" id="dist-slider-mob" min="0" max="150" value="1" step="1" style="flex: 1;">
            </div>
        </div>
        
        <div style="display: flex; flex-direction: column; gap: 8px;">
             <div class="lock-wrapper-mob" style="display: flex; align-items: center; justify-content: center;">
                <input type="checkbox" id="lock-angle-mob" style="width: 24px; height: 24px;">
            </div>
            <button class="delete-btn-mob" onclick="deleteSelected()" style="background:none; border:none; font-size: 20px;">❌</button>
        </div>
    </div> <div class="mobile-buttons">
        <button class="tool-btn" data-tool="raketa">🚀</button>
        <button class="tool-btn" data-tool="shahed">🛸</button>
        <button class="tool-btn" data-tool="rozvid">🕵️‍♂️</button>
        <button class="clear-all-mob" onclick="clearAll()">🗑️</button>
    </div>
</div>

<script>
  // Блокуємо праву кнопку миші
  document.addEventListener('contextmenu', e => e.preventDefault());

  // Блокуємо клавіші (F12, Ctrl+U, Ctrl+Shift+I)
  document.onkeydown = function(e) {
    if (e.keyCode == 123 || 
        (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) || 
        (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0))) {
      return false;
    }
  };
</script>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="script.js"></script>

</body>
</html>
